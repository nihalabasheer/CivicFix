{% extends "user/layout.html" %}

{% block page_title %}Dashboard{% endblock %}

{% block user_content %}
<div class="card shadow-sm">
    <div class="card-body p-4">
        <h2 class="card-title mb-2">Welcome, {{ session.get('name', 'User') }}!</h2>
        <p class="text-muted mb-4">Report civic issues and track their progress from your dashboard.</p>

        <div class="d-flex flex-wrap gap-3">
            <a href="{{ url_for('user.report_issue') }}" class="btn btn-primary btn-lg">
                Report Issue
            </a>
            <a href="{{ url_for('user.my_issues') }}" class="btn btn-outline-primary btn-lg">
                My Issues
            </a>
        </div>
    </div>
</div>
{% endblock %}
