{% extends "user/layout.html" %}

{% block page_title %}Report Issue{% endblock %}

{% block user_content %}
<div class="card shadow-sm">
    <div class="card-body p-4">
        <h2 class="card-title mb-2">Report an Issue</h2>
        <p class="text-muted mb-4">Upload a photo and describe the civic problem and its location.</p>

        <form method="POST" action="{{ url_for('user.report_issue') }}" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="image" class="form-label">Image</label>
                <input type="file" class="form-control" id="image" name="image"
                       accept=".jpg,.jpeg,.png,image/jpeg,image/png" required>
                <div class="form-text">Allowed formats: JPG, JPEG, PNG</div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4"
                          placeholder="Describe the issue (e.g. pothole, broken streetlight)..."
                          required>{{ request.form.get('description', '') }}</textarea>
            </div>

            <div class="mb-4">
                <label for="location" class="form-label">Location</label>
                <input type="text" class="form-control" id="location" name="location"
                       placeholder="Street, landmark, or area"
                       value="{{ request.form.get('location', '') }}" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Upload &amp; Save</button>
                <a href="{{ url_for('user.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
